<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>WebLLM RAG Sample</title>

<style>
body{
    font-family:sans-serif;
    max-width:900px;
    margin:auto;
    padding:20px;
}

textarea{
    width:100%;
    height:100px;
}

button{
    margin-top:10px;
    padding:10px;
}

#answer{
    margin-top:20px;
    white-space:pre-wrap;
    border:1px solid #ccc;
    padding:10px;
}

#results{
    margin-top:20px;
}

#results h2{
    font-size:18px;
}

ol.hits{
    padding-left:20px;
}

ol.hits li{
    margin-bottom:12px;
}

ol.hits a{
    font-weight:bold;
    text-decoration:none;
    color:#0b5fff;
}

ol.hits a:hover{
    text-decoration:underline;
}

ol.hits .meta{
    font-size:13px;
    color:#666;
    margin-top:2px;
}

ol.hits .score{
    margin-left:8px;
    color:#999;
}
</style>
</head>
<body>

<h1>WebLLM RAG Demo</h1>

<p>e-Govデータポータルのメタデータを検索し、関連するデータセットの上位5件のURLを表示します。</p>

<textarea id="question" placeholder="例: 人口に関する統計データはありますか？"></textarea>

<br>

<button id="askButton">
検索
</button>

<div id="results"></div>

<div id="answer"></div>

<script type="module" src="./app.js"></script>

</body>
</html>
